<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OptiCrop - Find Your Crop</title>
<style>
    body {
    margin: 0;
    background-image: url("{{ url_for('static', filename='findcrop image.jpg') }}");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
}
  .topnav {
    background-color: #333;
    overflow: hidden;
  }
  .topnav a {
    float: left;
    display: block;
    color: #f2f2f2;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
  }
  .topnav a:hover {
    background-color: #ddd;
    color: black;
  }
  .topnav a.active {
    background-color: #2e7d32;
    color: white;
  }
  .banner {
    background-color: yellow;
    text-align: center;
    padding: 10px;
    font-style: italic;
    color: red;
    font-weight: bold;
  }
  form {
    display: inline-block;
    text-align: left;
    background: transparent;
    padding: 0px;

  }
  input[type="text"] {
    width: 200px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.9);
    border: 1px solid;
    padding: 5px;
  }
</style>
</head>
<body>

<div class="topnav">
  <a href="{{ url_for('home') }}">Home</a>
  <a href="{{ url_for('about') }}">About</a>
  <a class="active" href="#findyourcrop">FindYourCrop</a>
</div>

<div class="banner">Find Your Best Crop Here</div>
<h3 style="text-align:center;">Please enter the conditions</h3>

<center>
<form action="{{ url_for('predict') }}" method="post">
  <label for="nitrogen">nitrogen:</label><br>
  <input type="text" id="nitrogen" name="nitrogen" placeholder="nitrogen" required="required"><br><br>

  <label for="phosphorous">phosphorous:</label><br>
  <input type="text" id="phosphorous" name="phosphorous" placeholder="phosphorous" required="required"><br><br>

  <label for="potassium">potassium:</label><br>
  <input type="text" id="potassium" name="potassium" placeholder="potassium" required="required"><br><br>

  <label for="temperature">temperature:</label><br>
  <input type="text" id="temperature" name="temperature" placeholder="temperature" required="required"><br><br>

  <label for="humidity">humidity:</label><br>
  <input type="text" id="humidity" name="humidity" placeholder="humidity" required="required"><br><br>

  <label for="ph">ph:</label><br>
  <input type="text" id="ph" name="ph" placeholder="ph" required="required"><br><br>

  <label for="rainfall">rainfall:</label><br>
  <input type="text" id="rainfall" name="rainfall" placeholder="rainfall" required="required"><br><br>

  <button type="submit" class="btn btn-primary btn-block">Predict</button>
</form>
<br>
</center>

<h3>
  <p class="flask-output">{{ prediction_text }}</p>
</h3>

</body>
</html>
